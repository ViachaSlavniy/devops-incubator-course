name: CI-Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Login to Docker Hub
        run: echo "${{secrets.DOCKER_PASS}}" | docker login -u ${{secrets.DOCKER_USER}} --password stdin
      - name: Build Docker Image
        run: docker build -t ${{DOCKER_USER}}/my-node-app:${{github.sha}} .
      - name: Push to Docker Hub
        run: docker push ${{DOCKER_USER}}/my-node-app:${{github.sha}}
