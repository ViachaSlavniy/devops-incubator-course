name: Check PR

on:
  workflow_call:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Установка зависимостей
        run: npm ci
      - name: Линтинг
        run: npm run lint
      - name: Тесты
        run: npm run test
